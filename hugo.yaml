markup:
  highlight:
    codeFences: true
    guessSyntax: false
    lineNos: false
    noClasses: false
  goldmark:
    renderer:
      unsafe: true  # Allow HTML in markdown files
    extensions:
      footnote: true
  tableOfContents:
    startLevel: 1
    endLevel: 3
    ordered: true


outputs:
  home:
    - HTML
    - RSS

# Static file configuration
staticDir: 
  - static

mediaTypes:
  image/svg+xml:
    suffixes:
      - svg

outputFormats:
  SVG:
    mediaType: image/svg+xml
    isPlainText: true
    isHTML: false

module:
  mounts:
    - disableWatch: false
      source: static
      target: static
    - disableWatch: false
      source: pagefind
      target: assets/pagefind
    - disableWatch: false
      source: static/images
      target: assets/images
    - disableWatch: false
      source: content
      target: assets/content
    - disableWatch: false
      source: pagefind
      target: static/pagefind
    - disableWatch: false
      source: static/images
      target: static/images
