{{ define "main" }}
<div class="content-container">
    {{ if .Content }}
        <div class="sidebar sidebar-fixed" id="sidebar">
            {{ partial "sidebar.html" . }}
        </div>
        <div class="content">
            {{ if not ( eq .Title "ESPHome Docs") }}
                <h1>{{ .Title }}</h1>
            {{ end }}
            {{ .Content }}
        </div>
        <div class="overlay" id="overlay"></div>
        <div class="sidebar sidebar-mobile">
            {{ partial "sidebar.html" . }}
        </div>
    {{ else }}
        <div class="content">
            <h1>{{ .Title }}</h1>
            {{ partial "sidebar.html" . }}
        </div>
    {{ end }}
</div>
{{ end }}
