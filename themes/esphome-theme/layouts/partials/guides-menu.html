{{ $currentPage := . }}
<ul>
    {{ range where .Site.Pages "Section" "guides" }}
        {{ if .IsSection }}
            {{ continue }}
        {{ end }}
        <li>
            <a href="{{ .RelPermalink }}" class="{{ if eq $currentPage.RelPermalink .RelPermalink }}active{{ end }}">
                {{ .Title }}
            </a>
        </li>
    {{ end }}
</ul>
