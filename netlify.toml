[build]
  publish = "public"
  command = "make netlify"
  environment = { BASE_URL = "https://esphome.io", API_DOCS_URL = "https://api-docs.esphome.io", PYTHON_VERSION = "3.12", HUGO_VERSION = "0.147.8" }

[context.beta]
  environment = { BASE_URL = "https://beta.esphome.io", API_DOCS_URL = "https://api-docs-beta.esphome.io" }

[context.next]
  environment = { BASE_URL = "https://next.esphome.io", API_DOCS_URL = "https://api-docs-dev.esphome.io" }

[context.new]
  environment = { BASE_URL = "https://new.esphome.io", API_DOCS_URL = "https://api-docs-dev.esphome.io" }

[context.production]
  environment = { BASE_URL = "https://esphome.io", API_DOCS_URL = "https://api-docs.esphome.io", PRODUCTION = "YES" }


# Caching HTML - 1 week
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Images, CSS, JS - 1 year, immutable. CSS and JS are fingerprinted
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,webp,svg,css,js}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


[[redirects]]
  from = "/esphomeyaml/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/chat"
  to = "https://discord.gg/KhAMKrd"
  status = 301

# This redirect is for the api docs that have been moved.
# It is replaced by sed in the makefile when netlify is building the site.
[[redirects]]
  from = "/api/*"
  to = "{{API_DOCS_URL}}/:splat"
  status = 301

# Webserver files
[[redirects]]
  from = "/_static/webserver-v1.*"
  to = "https://oi.esphome.io/v1/webserver-v1.:splat"
  status = 301

